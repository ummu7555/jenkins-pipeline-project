<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevOps CI/CD Dashboard</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ==========================
   GENERAL
========================== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#1e3c72,#2a5298);

color:white;

overflow-x:hidden;

}

/* NAVBAR */

nav{

display:flex;

justify-content:space-between;

align-items:center;

padding:20px 60px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

position:sticky;

top:0;

}

.logo{

font-size:28px;

font-weight:bold;

color:#4ade80;

}

nav ul{

display:flex;

list-style:none;

gap:30px;

}

nav ul li{

cursor:pointer;

transition:.3s;

}

nav ul li:hover{

color:#4ade80;

}

/* HERO */

.hero{

text-align:center;

padding:80px 20px;

}

.hero h1{

font-size:60px;

margin-bottom:20px;

}

.hero span{

color:#4ade80;

}

.hero p{

font-size:22px;

opacity:.9;

margin-bottom:35px;

}

button{

padding:15px 40px;

font-size:18px;

border:none;

border-radius:30px;

background:#4ade80;

color:black;

cursor:pointer;

transition:.3s;

font-weight:bold;

}

button:hover{

transform:scale(1.05);

}

/* CARDS */

.container{

width:90%;

margin:auto;

}

.cards{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(220px,1fr));

gap:25px;

margin-top:40px;

}

.card{

background:rgba(255,255,255,0.08);

padding:30px;

border-radius:20px;

text-align:center;

transition:.4s;

backdrop-filter:blur(10px);

}

.card:hover{

transform:translateY(-10px);

background:#2563eb;

}

.card h2{

margin-top:15px;

margin-bottom:10px;

}

.card p{

opacity:.9;

}

/* STATUS */

.status{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

margin-top:60px;

}

.box{

background:white;

color:black;

padding:25px;

border-radius:18px;

text-align:center;

}

.box h2{

margin-bottom:15px;

}

/* PIPELINE */

.pipeline{

margin-top:70px;

text-align:center;

}

.steps{

display:flex;

justify-content:center;

align-items:center;

flex-wrap:wrap;

gap:20px;

margin-top:30px;

}

.step{

background:#22c55e;

padding:20px;

border-radius:15px;

font-weight:bold;

font-size:20px;

}

.arrow{

font-size:35px;

}

/* FOOTER */

footer{

margin-top:80px;

padding:25px;

text-align:center;

background:rgba(255,255,255,.08);

}

</style>

</head>

<body>

<nav>

<div class="logo">🚀 DevOps Dashboard</div>

<ul>

<li>Home</li>

<li>Pipeline</li>

<li>Services</li>

<li>Contact</li>

</ul>

</nav>

<section class="hero">

<h1>Welcome to <span>My Jenkins CI/CD Project</span></h1>

<p>GitHub • Jenkins • Docker • AWS EC2 • Nginx</p>

<button>View Pipeline</button>

</section>

<div class="container">

<div class="cards">

<div class="card">

<h1>🐙</h1>

<h2>GitHub</h2>

<p>Source Code Repository</p>

</div>

<div class="card">

<h1>⚙️</h1>

<h2>Jenkins</h2>

<p>Automation Server</p>

</div>

<div class="card">

<h1>🐳</h1>

<h2>Docker</h2>

<p>Container Platform</p>

</div>

<div class="card">

<h1>☁️</h1>

<h2>AWS EC2</h2>

<p>Cloud Deployment</p>

</div>

<div class="card">

<h1>🌐</h1>

<h2>Nginx</h2>

<p>Web Server</p>

</div>

</div>
